<div class="flex h-screen bg-gray-50 overflow-hidden pb-16 md:pb-0 pt-14 md:pt-0">
  @if (isAuthenticated()) {
    <app-mobile-header></app-mobile-header>
    <aside class="hidden lg:flex flex-col w-56 bg-teal-800 text-white border-r border-teal-900/40 flex-shrink-0">
      <div class="px-4 py-5 flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-teal-500 flex items-center justify-center text-white font-extrabold">F
          </div>
          <span class="text-lg font-semibold">Flowie</span>
        </div>
      </div>
      <nav class="flex-1 px-2 py-2 space-y-1 overflow-y-auto">
        <a
          routerLink="/dashboard"
          [routerLinkActive]="['bg-white/10','text-white','font-semibold','!text-white']"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center rounded-md px-3 py-2 text-sm font-medium text-white/85 hover:text-white hover:bg-white/10 transition-colors"
        >
          <span class="truncate">Dashboard</span>
        </a>
        <a
          routerLink="/taken"
          [routerLinkActive]="['bg-white/10','text-white','font-semibold','!text-white']"
          [routerLinkActiveOptions]="{ exact: false }"
          class="flex items-center rounded-md px-3 py-2 text-sm font-medium text-white/85 hover:text-white hover:bg-white/10 transition-colors"
        >
          <span class="truncate">Taken</span>
        </a>
        <a
          routerLink="/instellingen"
          [routerLinkActive]="['bg-white/10','text-white','font-semibold','!text-white']"
          class="flex items-center rounded-md px-3 py-2 text-sm font-medium text-white/85 hover:text-white hover:bg-white/10 transition-colors"
        >
          <span class="truncate">Instellingen</span>
        </a>
      </nav>
      <div class="p-4 border-t border-teal-900/40 flex-shrink-0">
        <div class="flex items-center justify-between">
          <div class="flex items-center min-w-0 flex-1">
            <div class="ml-3 min-w-0 flex-1">
              <p class="text-sm font-medium leading-tight truncate">{{ currentUser()?.name }}</p>
            </div>
          </div>
          <button
            type="button"
            (click)="onLogout()"
            class="ml-2 p-1.5 rounded-md text-white/70 hover:text-white hover:bg-white/10 transition-colors flex-shrink-0"
            title="Uitloggen"
          >
            <i class="fas fa-right-from-bracket w-5 h-5"></i>
          </button>
        </div>
      </div>
    </aside>
  }
  <div class="flex-1 overflow-hidden">
    <router-outlet></router-outlet>
  </div>
  @if (isAuthenticated()) {
    <app-bottom-nav></app-bottom-nav>
  }
</div>

<app-notification-container></app-notification-container>
