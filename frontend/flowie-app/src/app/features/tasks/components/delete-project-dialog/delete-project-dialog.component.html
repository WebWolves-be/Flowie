<div class="w-screen h-screen md:h-auto md:min-w-[500px] md:max-w-[32rem] md:max-h-[90vh] bg-white rounded-none md:rounded-xl shadow-xl p-0 md:p-6 flex flex-col md:block" role="dialog" aria-modal="true">
  <h3 class="text-lg font-semibold text-gray-900 mb-4 px-4 pt-4 md:px-0 md:pt-0">Project verwijderen</h3>

  @if (errorMessage()) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg mx-4 md:mx-0">
      <div class="flex items-start">
        <svg class="h-5 w-5 text-red-600 mt-0.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-sm text-red-800">{{ errorMessage() }}</p>
      </div>
    </div>
  }

  <p class="mb-4 text-sm text-gray-600 px-4 md:px-0">
    Weet u zeker dat u dit project wilt verwijderen? Alle secties, taken en subtaken worden ook verwijderd.
  </p>

  <p class="mb-4 text-sm font-semibold text-gray-900 px-4 md:px-0">
    {{ project.title }}
  </p>

  <div class="mt-auto md:mt-0 flex flex-col-reverse md:flex-row md:justify-end gap-3 px-4 pb-4 md:px-0 md:pb-0">
    <button
      type="button"
      (click)="onCancel()"
      class="w-full md:w-auto px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">
      Annuleren
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="w-full md:w-auto px-4 py-2 text-sm rounded-lg bg-red-600 text-white hover:bg-red-500">
      Verwijderen
    </button>
  </div>
</div>
