<div class="flex flex-col w-screen h-screen md:h-auto md:w-[32rem] md:min-w-[500px] md:max-h-[90vh] bg-white rounded-none md:rounded-xl shadow-xl" role="dialog" aria-modal="true">
  <div class="flex items-center justify-between flex-shrink-0 px-4 py-4 md:px-6 md:pt-6 md:pb-0 border-b border-gray-200 md:border-b-0">
    <h2 class="text-lg font-semibold text-gray-900">{{ titleLabel() }}</h2>
    <button type="button" (click)="onCancel()" class="md:hidden p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <form [formGroup]="taskForm" class="flex-1 flex flex-col min-h-0" (ngSubmit)="onSubmit()">
    <div class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-4 space-y-4">
      @if (isSubtask && parentTaskTitle()) {
        <div class="bg-teal-50 border border-teal-200 rounded-lg p-3">
          <div class="flex items-start">
            <i class="fas fa-circle-info text-teal-600 mt-0.5 mr-2 flex-shrink-0"></i>
            <div>
              <p class="text-sm font-medium text-teal-800 mb-1">
                Taak:
                <span class="text-teal-900 font-semibold">{{ parentTaskTitle() }}</span>
              </p>
            </div>
          </div>
        </div>
      }

      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-800">
          <i class="fas fa-circle-exclamation text-red-600 mr-2 flex-shrink-0 mt-0.5"></i>
          {{ errorMessage() }}
        </div>
      }

      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
          Titel <span class="text-red-600">*</span>
        </label>
        <input id="title" type="text" formControlName="title"
               class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2"
               [class.border-2]="title?.invalid && title?.touched"
               [class.border-red-500]="title?.invalid && title?.touched"
               [class.focus:ring-red-500]="title?.invalid && title?.touched"
               [class.focus:border-red-500]="title?.invalid && title?.touched"
               [class.border]="!(title?.invalid && title?.touched)"
               [class.border-gray-300]="!(title?.invalid && title?.touched)"
               [class.focus:ring-teal-500]="!(title?.invalid && title?.touched)"
               [class.focus:border-teal-500]="!(title?.invalid && title?.touched)" />
      </div>
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Omschrijving</label>
        <quill-editor
          formControlName="description"
          [modules]="editorModules"
          [styles]="{ height: '120px' }"
          placeholder="Typ hier de omschrijving...">
        </quill-editor>
      </div>
      @if (!hasSubtasks()) {
        <div>
          <label for="taskTypeId" class="block text-sm font-medium text-gray-700 mb-2">
            Type <span class="text-red-600">*</span>
          </label>
          <select id="taskTypeId" formControlName="taskTypeId"
                  class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
            <option [value]="null">-- Selecteer type --</option>
            @for (type of taskTypes(); track type.taskTypeId) {
              <option [value]="type.taskTypeId">{{ type.name }}</option>
            }
          </select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-2">
              Deadline
            </label>
            <input id="dueDate" type="date" formControlName="dueDate"
                   class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2"
                   [class.border-2]="dueDate?.invalid && dueDate?.touched"
                   [class.border-red-500]="dueDate?.invalid && dueDate?.touched"
                   [class.focus:ring-red-500]="dueDate?.invalid && dueDate?.touched"
                   [class.focus:border-red-500]="dueDate?.invalid && dueDate?.touched"
                   [class.border]="!(dueDate?.invalid && dueDate?.touched)"
                   [class.border-gray-300]="!(dueDate?.invalid && dueDate?.touched)"
                   [class.focus:ring-teal-500]="!(dueDate?.invalid && dueDate?.touched)"
                   [class.focus:border-teal-500]="!(dueDate?.invalid && dueDate?.touched)" />
          </div>
          <div>
            <label for="employeeId" class="block text-sm font-medium text-gray-700 mb-2">
              Medewerker
            </label>
            <select id="employeeId" formControlName="employeeId"
                    class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option [ngValue]="null">-- Niet toegewezen --</option>
              @for (employee of employees(); track employee.id) {
                <option [value]="employee.id">{{ employee.firstName }} {{ employee.lastName }}</option>
              }
            </select>
          </div>
        </div>
      } @else {
        <div class="bg-teal-50 border border-teal-200 rounded-lg p-3 text-sm text-teal-800">
          <i class="fas fa-circle-info text-teal-600 mr-2 flex-shrink-0"></i>
          Taken met subtaken kunnen enkel titel en omschrijving wijzigen.
        </div>
      }
    </div>

    <div class="flex-shrink-0 flex flex-col-reverse md:flex-row md:justify-end gap-3 px-4 py-6 md:px-6 md:pb-8 md:pt-4 border-t border-gray-200 md:border-t-0 safe-area-bottom">
      <button type="button" (click)="onCancel()"
              class="w-full md:w-auto px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">
        Annuleren
      </button>
      <button type="submit"
              class="w-full md:w-auto px-4 py-2 text-sm rounded-lg bg-teal-600 text-white hover:bg-teal-500 disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="taskForm.invalid">
        {{ actionLabel() }}
      </button>
    </div>
  </form>
</div>
