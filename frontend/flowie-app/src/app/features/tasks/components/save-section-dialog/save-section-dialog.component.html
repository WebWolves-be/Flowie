<div class="flex flex-col w-screen h-screen md:w-auto md:h-auto md:w-[32rem] md:max-h-[90vh] bg-white rounded-none md:rounded-xl shadow-xl" role="dialog" aria-modal="true">
  <div class="flex items-center justify-between flex-shrink-0 px-4 py-4 md:px-6 md:pt-6 md:pb-0 border-b border-gray-200 md:border-b-0">
    <h2 class="text-lg font-semibold text-gray-900">{{ titleLabel }}</h2>
    <button type="button" (click)="onCancel()" class="md:hidden p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex-1 flex flex-col min-h-0">
    <div class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-4 space-y-4">
      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 rounded-lg p-3 flex items-start gap-2">
          <svg class="w-5 h-5 text-red-800 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p class="text-sm text-red-800">{{ errorMessage() }}</p>
        </div>
      }

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2" for="title">
          Titel <span class="text-red-600">*</span>
        </label>
        <input
          id="title"
          type="text"
          formControlName="title"
          class="w-full rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2"
          [class]="form.controls.title.invalid && form.controls.title.touched
            ? 'border-2 border-red-500 focus:ring-red-500 focus:border-red-500'
            : 'border border-gray-300 focus:ring-teal-500 focus:border-teal-500'"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2" for="description">
          Omschrijving
        </label>
        <quill-editor
          formControlName="description"
          [modules]="editorModules"
          [styles]="{ height: '120px' }"
          class="w-full"
          placeholder="Typ hier de omschrijving...">
        </quill-editor>
      </div>
    </div>

    <div class="flex-shrink-0 flex flex-col-reverse md:flex-row md:justify-end gap-3 px-4 py-6 md:px-6 md:pb-8 md:pt-4 border-t border-gray-200 md:border-t-0 safe-area-bottom">
      <button
        type="button"
        (click)="onCancel()"
        class="w-full md:w-auto px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50"
      >
        Annuleren
      </button>
      <button
        type="submit"
        class="w-full md:w-auto px-4 py-2 text-sm rounded-lg bg-teal-600 text-white hover:bg-teal-500 disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="form.invalid"
      >
        {{ actionLabel }}
      </button>
    </div>
  </form>
</div>
