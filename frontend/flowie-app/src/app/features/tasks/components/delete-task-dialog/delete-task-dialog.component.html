<div class="flex flex-col w-screen h-screen md:h-auto md:w-[32rem] md:min-w-[500px] md:max-h-[90vh] bg-white rounded-none md:rounded-xl shadow-xl" role="dialog" aria-modal="true">
  <div class="flex items-center justify-between flex-shrink-0 px-4 py-4 md:px-6 md:pt-6 md:pb-0 border-b border-gray-200 md:border-b-0">
    <h3 class="text-lg font-semibold text-gray-900">{{ isSubtask ? 'Subtaak verwijderen' : 'Taak verwijderen' }}</h3>
    <button type="button" (click)="onCancel()" class="md:hidden p-1 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto px-4 py-4 md:px-6 md:py-4 space-y-4">
    @if (errorMessage()) {
      <div class="p-3 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-start">
          <svg class="h-5 w-5 text-red-600 mt-0.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-sm text-red-800">{{ errorMessage() }}</p>
        </div>
      </div>
    }

    <p class="text-sm text-gray-600">
      Weet je zeker dat je de {{ isSubtask ? 'subtaak' : 'taak' }} <strong class="text-gray-900">{{ task.title }}</strong> wilt verwijderen?
    </p>
  </div>

  <div class="flex-shrink-0 flex flex-col-reverse md:flex-row md:justify-end gap-3 px-4 py-6 md:px-6 md:pb-8 md:pt-4 border-t border-gray-200 md:border-t-0 safe-area-bottom">
    <button
      type="button"
      (click)="onCancel()"
      class="w-full md:w-auto px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50">
      Annuleren
    </button>
    <button
      type="button"
      (click)="onConfirm()"
      class="w-full md:w-auto px-4 py-2 text-sm rounded-lg bg-red-600 text-white hover:bg-red-500">
      Verwijderen
    </button>
  </div>
</div>
